<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組み分けテスト（5月）対策クイズ</title>
<style>
:root{--bg:#f5f4f0;--card:#fff;--border:#e2ddd6;--border2:#c8c2b8;--text:#1a1a18;--text2:#6b6760;--text3:#a8a49f;--green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;--red:#C0392B;--red-bg:#FDEDEC;--red-text:#5B1A1A;--blue:#2563eb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:620px;margin:0 auto;padding:1rem;}
.top{padding:1.5rem 0 1rem;}
.top-title{font-size:22px;font-weight:700;line-height:1.4;margin-bottom:4px;}
.top-sub{font-size:13px;color:var(--text2);margin-bottom:1.25rem;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.fbtn{border:1.5px solid var(--border2);border-radius:20px;padding:6px 15px;font-size:13px;cursor:pointer;background:white;color:var(--text2);font-family:inherit;transition:all .15s;}
.fbtn:hover{background:var(--bg);}
.fbtn.on{background:var(--text);color:white;border-color:var(--text);}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mcard{border:1.5px solid var(--border);border-radius:16px;padding:1.4rem 1.2rem;cursor:pointer;background:white;transition:all .15s;text-align:left;}
.mcard:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.mcard-icon{font-size:30px;margin-bottom:8px;}
.mcard-title{font-size:15px;font-weight:700;margin-bottom:5px;}
.mcard-desc{font-size:12px;color:var(--text2);line-height:1.7;}
.count-note{font-size:12px;color:var(--text3);text-align:center;margin-top:.5rem;}
.card-screen{display:flex;flex-direction:column;padding-bottom:2rem;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;margin-bottom:.5rem;}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px;}
.header-info{font-size:13px;color:var(--text2);}
.prog-bar-wrap{background:var(--border);border-radius:4px;height:4px;margin-bottom:1rem;}
.prog-bar{height:4px;border-radius:4px;background:var(--green);transition:width .3s;}
.sbadge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:.6rem;}
.sbadge-kokugo{background:#ede9fe;color:#5b21b6;}
.sbadge-rika{background:#d1fae5;color:#065f46;}
.sbadge-shakai{background:#fef3c7;color:#92400e;}
.section-name{font-size:11px;color:var(--text3);margin-bottom:.4rem;}
.c-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:.75rem;min-height:120px;display:flex;flex-direction:column;justify-content:center;}
.c-card-answer{background:var(--green-bg);border-color:var(--green);}
.c-q{font-size:16px;line-height:1.85;color:var(--text);text-align:center;}
.c-a{font-size:22px;font-weight:700;color:var(--green-text);text-align:center;line-height:1.5;margin-top:.5rem;}
.c-fig{margin:.5rem 0;overflow-x:auto;display:flex;justify-content:center;}
.c-exp{background:#fefce8;border:1.5px solid #fde047;border-radius:12px;padding:.9rem 1rem;font-size:13px;line-height:1.75;color:#713f12;margin-bottom:.75rem;}
.hint-row{font-size:12px;color:var(--text3);text-align:center;margin-bottom:.6rem;}
.action-row{display:flex;gap:10px;margin-bottom:.75rem;}
.action-btn{flex:1;border:1.5px solid var(--border2);border-radius:12px;padding:12px 8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-again{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.btn-ok{background:var(--green-bg);color:var(--green-text);border-color:var(--green);}
.btn-hint{background:#EFF6FF;color:#1d4ed8;border-color:#93c5fd;}
.btn-reveal{background:#f5f4f0;color:var(--text);border-color:var(--border2);}
.nav-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-top:1rem;}
.nav-btn{border:1.5px solid var(--border2);border-radius:12px;padding:10px 16px;font-size:14px;cursor:pointer;background:white;color:var(--text);font-family:inherit;}
.nav-btn:disabled{opacity:.35;cursor:default;}
.shuffle-btn{border:1.5px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;background:white;color:var(--text2);font-family:inherit;}
.dots-wrap{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:.75rem 0;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .15s;}
.dot.current{background:var(--blue);transform:scale(1.3);}
.dot.ok-dot{background:var(--green);}
.dot.again-dot{background:var(--red);}
.choices{display:grid;grid-template-columns:1fr;gap:8px;}
.cbtn{background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;color:var(--text);text-align:left;line-height:1.5;font-family:inherit;}
.cbtn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-text);}
.cbtn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red-text);}
.cbtn.reveal{background:var(--green-bg);border-color:var(--green);color:var(--green-text);}
.cbtn:disabled{cursor:default;}
.fb{margin-top:.75rem;font-size:13px;padding:9px 13px;border-radius:10px;display:none;line-height:1.6;}
.fb.show{display:block;}
.fb.ok{background:var(--green-bg);color:var(--green-text);}
.fb.ng{background:var(--red-bg);color:var(--red-text);}
.complete-box{background:white;border:1.5px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;margin-top:1rem;}
.attack-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;margin-bottom:.5rem;}
.timer-box{font-size:22px;font-weight:700;min-width:50px;text-align:center;}
.timer-box.warn{color:var(--red);}
.atbar-wrap{background:var(--border);border-radius:3px;height:3px;margin-bottom:1rem;}
.atbar{height:3px;border-radius:3px;background:var(--blue);transition:width .1s linear;}
.qcard{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.qtext{font-size:15px;line-height:1.85;margin-bottom:1rem;}
.qfig{margin:.5rem 0 .75rem;overflow-x:auto;}
.anav{display:flex;justify-content:flex-end;margin-top:.75rem;}
.anext{background:var(--text);color:white;border:none;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:inherit;display:none;}
.anext.show{display:block;}
.result{text-align:center;padding:2rem .5rem;}
.result-big{font-size:58px;font-weight:700;line-height:1;}
.result-of{font-size:18px;color:var(--text2);}
.result-comment{font-size:18px;margin:1rem 0 1.5rem;}
.bd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.bd-card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;}
.bd-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.bd-score{font-size:22px;font-weight:700;}
.wrong-list{text-align:left;background:white;border:1.5px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.5rem;}
.wrong-list h3{font-size:13px;color:var(--text2);margin-bottom:.75rem;}
.wrong-item{font-size:13px;padding:.5rem 0;border-bottom:1px solid var(--border);line-height:1.6;}
.wrong-item:last-child{border-bottom:none;}
.wrong-ans{color:var(--green-text);font-weight:600;}
.rbtn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.rbtn{border:1.5px solid var(--border2);border-radius:10px;padding:10px 22px;font-size:14px;cursor:pointer;background:white;color:var(--text);font-family:inherit;}
.rbtn.primary{background:var(--text);color:white;border-color:var(--text);}
</style>
</head>

var mode = null;
var filter = 'all';
var qs = [];
var idx = 0;
var status = [];
var cardStage = 'question';
var choiceResult = null;
var shuffledChoices = [];
var timerInterval = null;
var atScore = 0;
var atWrong = [];
var atSubScores = {};
var atSubTotal = {};
var R = document.getElementById('root');

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function getPool() {
  if (filter === 'all') return ALL;
  return ALL.filter(function(q) { return q.subj === filter; });
}

function badgeClass(subj) {
  if (subj === '国語') return 'sbadge sbadge-kokugo';
  if (subj === '理科') return 'sbadge sbadge-rika';
  return 'sbadge sbadge-shakai';
}

// ===== RENDER TOP =====
function showTop() {
  clearInterval(timerInterval);
  mode = null;
  var pool = getPool();
  var kn = ALL.filter(function(q){return q.subj==='国語';}).length;
  var rn = ALL.filter(function(q){return q.subj==='理科';}).length;
  var sn = ALL.filter(function(q){return q.subj==='社会';}).length;

  var html = '<div class="top">';
  html += '<div class="top-title">組み分けテスト（5月）<br>対策クイズ</div>';
  html += '<div class="top-sub">国語・社会・理科 全' + ALL.length + '問</div>';
  html += '<div class="filter-row">';
  html += '<button class="fbtn' + (filter==='all'?' on':'') + '" id="fb-all">全科目（' + ALL.length + '）</button>';
  html += '<button class="fbtn' + (filter==='国語'?' on':'') + '" id="fb-kokugo">✏️ 国語（' + kn + '）</button>';
  html += '<button class="fbtn' + (filter==='理科'?' on':'') + '" id="fb-rika">🔬 理科（' + rn + '）</button>';
  html += '<button class="fbtn' + (filter==='社会'?' on':'') + '" id="fb-shakai">🗾 社会（' + sn + '）</button>';
  html += '</div>';
  html += '<div class="mode-grid">';
  html += '<div class="mcard" id="btn-card"><div class="mcard-icon">📚</div><div class="mcard-title">覚えるカード</div><div class="mcard-desc">カードをめくって答えを確認。「わかった！」「もう一度」で仕分け。前後に自由に移動できます。</div></div>';
  html += '<div class="mcard" id="btn-attack"><div class="mcard-icon">⏱️</div><div class="mcard-title">タイムアタック</div><div class="mcard-desc">1問30秒！選択肢から選ぶ形式。スピード勝負で実力を試そう。</div></div>';
  html += '</div>';
  html += '<div class="count-note">' + pool.length + '問が出題されます</div>';
  html += '</div>';
  R.innerHTML = html;

  document.getElementById('fb-all').addEventListener('click', function(){ filter='all'; showTop(); });
  document.getElementById('fb-kokugo').addEventListener('click', function(){ filter='国語'; showTop(); });
  document.getElementById('fb-rika').addEventListener('click', function(){ filter='理科'; showTop(); });
  document.getElementById('fb-shakai').addEventListener('click', function(){ filter='社会'; showTop(); });
  document.getElementById('btn-card').addEventListener('click', startCard);
  document.getElementById('btn-attack').addEventListener('click', startAttack);
}

// ===== CARD MODE =====
function startCard() {
  qs = getPool().slice();
  status = qs.map(function(){ return 'none'; });
  idx = 0; cardStage = 'question'; choiceResult = null; shuffledChoices = [];
  renderCard();
}

function renderCard() {
  var q = qs[idx];
  var tot = qs.length;
  var okCount = 0; var againCount = 0;
  for (var i = 0; i < status.length; i++) {
    if (status[i]==='ok') okCount++;
    else if (status[i]==='again') againCount++;
  }

  var html = '<div class="card-screen">';
  html += '<div class="card-header">';
  html += '<button class="back-btn" id="btn-back">←</button>';
  html += '<div class="header-info">' + (idx+1) + ' / ' + tot + '　✅' + okCount + '　😓' + againCount + '</div>';
  html += '</div>';
  html += '<div class="prog-bar-wrap"><div class="prog-bar" style="width:' + Math.round((idx+1)/tot*100) + '%"></div></div>';

  // dots
  html += '<div class="dots-wrap" id="dots-wrap">';
  for (var d = 0; d < qs.length; d++) {
    var dcls = 'dot' + (d===idx?' current':'') + (status[d]==='ok'?' ok-dot':'') + (status[d]==='again'?' again-dot':'');
    html += '<div class="' + dcls + '" data-idx="' + d + '"></div>';
  }
  html += '</div>';

  html += '<span class="' + badgeClass(q.subj) + '">' + q.subj + '</span>';
  html += '<div class="section-name">' + esc(q.s) + '</div>';

  var figHtml = q.fig ? '<div class="c-fig">' + FIGS[q.fig] + '</div>' : '';

  if (cardStage === 'question') {
    html += '<div class="c-card">' + figHtml + '<div class="c-q">' + esc(q.q) + '</div></div>';
    html += '<div class="hint-row">💡 まず自分で考えてみよう</div>';
    html += '<div class="action-row">';
    html += '<button class="action-btn btn-hint" id="btn-choices">🔢 4択にする</button>';
    html += '<button class="action-btn btn-reveal" id="btn-answer">答えを見る</button>';
    html += '</div>';

  } else if (cardStage === 'choices') {
    html += '<div class="c-card">' + figHtml + '<div class="c-q">' + esc(q.q) + '</div></div>';
    html += '<div class="choices" style="margin:.75rem 0;">';
    for (var ci = 0; ci < shuffledChoices.length; ci++) {
      var c = shuffledChoices[ci];
      var bcls = 'cbtn';
      var bdis = '';
      if (choiceResult) {
        if (c === q.a) bcls += ' reveal';
        else if (c === choiceResult && c !== q.a) bcls += ' wrong';
        bdis = ' disabled';
      }
      html += '<button class="' + bcls + '" data-ci="' + ci + '"' + bdis + '>' + esc(c) + '</button>';
    }
    html += '</div>';
    if (choiceResult) {
      if (choiceResult === 'correct') html += '<div class="fb show ok">✓ 正解！</div>';
      else html += '<div class="fb show ng">✗ 不正解。正解は「' + esc(q.a) + '」です。</div>';
      html += '<div class="action-row" style="margin-top:.75rem;"><button class="action-btn btn-reveal" id="btn-answer">答えを確認する</button></div>';
    }

  } else { // answer
    var badge = '';
    if (choiceResult === 'correct') badge = '<div style="font-size:12px;color:var(--green-text);margin-bottom:.5rem;">✓ 4択で正解しました</div>';
    else if (choiceResult === 'wrong') badge = '<div style="font-size:12px;color:var(--red);margin-bottom:.5rem;">✗ 4択で不正解でした</div>';
    html += '<div class="c-card c-card-answer">' + figHtml + '<div class="c-q">' + esc(q.q) + '</div>' + badge + '<div class="c-a">✅ ' + esc(q.a) + '</div></div>';
    if (q.exp) html += '<div class="c-exp">💡 ' + esc(q.exp) + '</div>';
    html += '<div class="action-row">';
    html += '<button class="action-btn btn-again" id="btn-again">😓 もう一度</button>';
    html += '<button class="action-btn btn-ok" id="btn-ok">✅ わかった！</button>';
    html += '</div>';
  }

  html += '<div class="nav-row">';
  html += '<button class="nav-btn" id="btn-prev"' + (idx===0?' disabled':'') + '>← 前へ</button>';
  html += '<div style="display:flex;justify-content:center;"><button class="shuffle-btn" id="btn-shuffle">🔀</button></div>';
  html += '<button class="nav-btn" id="btn-next"' + (idx===tot-1?' disabled':'') + '>次へ →</button>';
  html += '</div>';

  if (okCount + againCount === tot) {
    html += '<div class="complete-box">';
    html += '<div style="font-size:14px;color:var(--text2);margin-bottom:.5rem;">全問チェック完了！</div>';
    html += '<div>✅ わかった：<strong style="color:var(--green-text)">' + okCount + '</strong>問　😓 もう一度：<strong style="color:var(--red)">' + againCount + '</strong>問</div>';
    html += '<div class="rbtn-row" style="margin-top:1rem;">';
    html += '<button class="rbtn" id="btn-restart">もう一度</button>';
    html += '<button class="rbtn primary" id="btn-retry">😓のみ再挑戦</button>';
    html += '</div></div>';
  }

  html += '</div>';
  R.innerHTML = html;

  // attach events
  document.getElementById('btn-back').addEventListener('click', showTop);
  document.getElementById('btn-prev').addEventListener('click', prevQ);
  document.getElementById('btn-next').addEventListener('click', nextQ);
  document.getElementById('btn-shuffle').addEventListener('click', doShuffle);

  var dotsWrap = document.getElementById('dots-wrap');
  if (dotsWrap) {
    dotsWrap.addEventListener('click', function(e) {
      var di = e.target.getAttribute('data-idx');
      if (di !== null) jumpTo(parseInt(di));
    });
  }

  if (cardStage === 'question') {
    document.getElementById('btn-choices').addEventListener('click', showChoices);
    document.getElementById('btn-answer').addEventListener('click', showAnswer);
  } else if (cardStage === 'choices') {
    var cbtnList = document.querySelectorAll('.cbtn');
    cbtnList.forEach(function(b) {
      b.addEventListener('click', function() {
        var ci = parseInt(this.getAttribute('data-ci'));
        pickChoice(ci);
      });
    });
    var ba = document.getElementById('btn-answer');
    if (ba) ba.addEventListener('click', showAnswer);
  } else {
    var ba2 = document.getElementById('btn-again');
    var bo = document.getElementById('btn-ok');
    if (ba2) ba2.addEventListener('click', markAgain);
    if (bo) bo.addEventListener('click', markOk);
  }

  var br = document.getElementById('btn-restart');
  var bry = document.getElementById('btn-retry');
  if (br) br.addEventListener('click', startCard);
  if (bry) bry.addEventListener('click', retryAgain);
}

function showChoices() {
  shuffledChoices = shuffle(qs[idx].cs.slice());
  choiceResult = null;
  cardStage = 'choices';
  renderCard();
}

function pickChoice(ci) {
  var c = shuffledChoices[ci];
  choiceResult = (c === qs[idx].a) ? 'correct' : 'wrong';
  renderCard();
}

function showAnswer() { cardStage = 'answer'; renderCard(); }
function jumpTo(i) { idx = i; cardStage = 'question'; choiceResult = null; shuffledChoices = []; renderCard(); }
function prevQ() { if (idx > 0) { idx--; cardStage = 'question'; choiceResult = null; shuffledChoices = []; renderCard(); } }
function nextQ() { if (idx < qs.length-1) { idx++; cardStage = 'question'; choiceResult = null; shuffledChoices = []; renderCard(); } }

function markOk() {
  status[idx] = 'ok';
  if (idx < qs.length-1) { idx++; cardStage = 'question'; choiceResult = null; shuffledChoices = []; }
  renderCard();
}
function markAgain() {
  status[idx] = 'again';
  if (idx < qs.length-1) { idx++; cardStage = 'question'; choiceResult = null; shuffledChoices = []; }
  renderCard();
}
function doShuffle() {
  var combined = [];
  for (var i = 0; i < qs.length; i++) combined.push({q:qs[i], s:status[i]});
  combined = shuffle(combined);
  qs = combined.map(function(c){return c.q;});
  status = combined.map(function(c){return c.s;});
  idx = 0; cardStage = 'question'; choiceResult = null; shuffledChoices = [];
  renderCard();
}
function retryAgain() {
  var wrongQs = [];
  for (var i = 0; i < qs.length; i++) { if (status[i]==='again') wrongQs.push(qs[i]); }
  if (wrongQs.length === 0) { alert('😓の問題はありません！'); return; }
  qs = wrongQs;
  status = qs.map(function(){ return 'none'; });
  idx = 0; cardStage = 'question'; choiceResult = null; shuffledChoices = [];
  renderCard();
}

// ===== ATTACK MODE =====
function startAttack() {
  qs = shuffle(getPool());
  idx = 0; atScore = 0; atWrong = [];
  atSubScores = {'国語':0,'理科':0,'社会':0};
  atSubTotal = {'国語':0,'理科':0,'社会':0};
  for (var i = 0; i < qs.length; i++) atSubTotal[qs[i].subj]++;
  renderAttack();
}

function renderAttack() {
  clearInterval(timerInterval);
  if (idx >= qs.length) { showResult(); return; }
  var q = qs[idx];
  var tot = qs.length;
  var sh = shuffle(q.cs.slice());
  var figHtml = q.fig ? '<div class="qfig">' + FIGS[q.fig] + '</div>' : '';

  var html = '<div class="card-screen">';
  html += '<div class="attack-header">';
  html += '<button class="back-btn" id="atk-back">←</button>';
  html += '<span class="' + badgeClass(q.subj) + '">' + q.subj + '</span>';
  html += '<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:13px;color:var(--text2)">' + (idx+1) + '/' + tot + '</span>';
  html += '<div class="timer-box" id="timer">30s</div></div>';
  html += '</div>';
  html += '<div class="prog-bar-wrap"><div class="prog-bar" style="width:' + Math.round(idx/tot*100) + '%"></div></div>';
  html += '<div class="atbar-wrap"><div class="atbar" id="atbar" style="width:100%"></div></div>';
  html += '<div class="qcard">';
  html += '<div class="section-name">' + esc(q.s) + '</div>';
  html += '<div class="qtext">' + esc(q.q) + '</div>';
  html += figHtml;
  html += '<div class="choices" id="atk-choices">';
  for (var ci = 0; ci < sh.length; ci++) {
    html += '<button class="cbtn" data-val="' + esc(sh[ci]) + '" data-ci="' + ci + '">' + esc(sh[ci]) + '</button>';
  }
  html += '</div>';
  html += '<div class="fb" id="atk-fb"></div>';
  html += '</div>';
  html += '<div class="anav"><button class="anext" id="atk-next">次の問題 →</button></div>';
  html += '</div>';
  R.innerHTML = html;

  document.getElementById('atk-back').addEventListener('click', showTop);
  document.getElementById('atk-next').addEventListener('click', function() { idx++; renderAttack(); });

  var answered = false;
  var qLeft = 30;

  var cbtnList = document.querySelectorAll('#atk-choices .cbtn');
  cbtnList.forEach(function(b) {
    b.addEventListener('click', function() {
      if (answered) return;
      answered = true;
      clearInterval(timerInterval);
      var chosen = this.getAttribute('data-val');
      var answer = qs[idx].a;
      document.querySelectorAll('#atk-choices .cbtn').forEach(function(btn) {
        btn.disabled = true;
        if (btn.getAttribute('data-val') === answer) btn.classList.add('reveal');
      });
      var fb = document.getElementById('atk-fb');
      if (chosen === answer) {
        this.classList.remove('reveal');
        this.classList.add('correct');
        fb.textContent = '✓ 正解！'; fb.className = 'fb show ok';
        atScore++; atSubScores[qs[idx].subj]++;
      } else {
        this.classList.add('wrong');
        fb.textContent = '✗ 不正解。正解は「' + qs[idx].a + '」です。'; fb.className = 'fb show ng';
        atWrong.push(qs[idx]);
      }
      document.getElementById('atk-next').className = 'anext show';
    });
  });

  timerInterval = setInterval(function() {
    qLeft--;
    var tel = document.getElementById('timer');
    var tbar = document.getElementById('atbar');
    if (tel) { tel.textContent = qLeft + 's'; if (qLeft<=5) tel.className='timer-box warn'; }
    if (tbar) tbar.style.width = (qLeft/30*100) + '%';
    if (qLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        answered = true;
        var answer = qs[idx].a;
        document.querySelectorAll('#atk-choices .cbtn').forEach(function(b) {
          b.disabled = true;
          if (b.getAttribute('data-val') === answer) b.classList.add('reveal');
        });
        var fb = document.getElementById('atk-fb');
        fb.textContent = '⏰ 時間切れ！正解は「' + answer + '」です。'; fb.className = 'fb show ng';
        atWrong.push(qs[idx]);
        document.getElementById('atk-next').className = 'anext show';
      }
    }
  }, 1000);
}

function showResult() {
  clearInterval(timerInterval);
  var tot = qs.length;
  var pct = Math.round(atScore/tot*100);
  var comment = pct>=90?'🎉 すばらしい！':pct>=70?'👍 よくできました！':pct>=50?'📚 もう一息！':'💪 もっと練習しよう！';

  var html = '<div class="result">';
  html += '<div style="font-size:13px;color:var(--text2);margin-bottom:.5rem;">⏱️ タイムアタック 完了！</div>';
  html += '<div class="result-big">' + atScore + '</div>';
  html += '<div class="result-of">／' + tot + '問正解（' + pct + '%）</div>';
  html += '<div class="result-comment">' + comment + '</div>';
  html += '<div class="bd-grid">';
  var subjs = ['国語','理科','社会'];
  for (var i = 0; i < subjs.length; i++) {
    var s = subjs[i];
    html += '<div class="bd-card"><div class="bd-label">' + s + '</div><div class="bd-score">' + (atSubScores[s]||0) + '／' + (atSubTotal[s]||0) + '</div></div>';
  }
  html += '</div>';
  if (atWrong.length > 0) {
    html += '<div class="wrong-list"><h3>📝 間違えた問題（' + atWrong.length + '問）</h3>';
    for (var j = 0; j < atWrong.length; j++) {
      html += '<div class="wrong-item">' + esc(atWrong[j].q) + '<br><span class="wrong-ans">→ ' + esc(atWrong[j].a) + '</span></div>';
    }
    html += '</div>';
  }
  html += '<div class="rbtn-row">';
  html += '<button class="rbtn" id="res-top">トップに戻る</button>';
  html += '<button class="rbtn primary" id="res-retry">もう一度！</button>';
  html += '</div></div>';
  R.innerHTML = html;

  document.getElementById('res-top').addEventListener('click', showTop);
  document.getElementById('res-retry').addEventListener('click', startAttack);
}

showTop();

})();
</script>
</body>
</html>
