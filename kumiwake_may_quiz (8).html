<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組み分けテスト（5月）対策クイズ</title>
<style>
:root{
  --bg:#f5f4f0;--card:#fff;--border:#e2ddd6;--border2:#c8c2b8;
  --text:#1a1a18;--text2:#6b6760;--text3:#a8a49f;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;
  --red:#C0392B;--red-bg:#FDEDEC;--red-text:#5B1A1A;
  --blue:#2563eb;--yellow:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:620px;margin:0 auto;padding:1rem;}

/* ===== TOP ===== */
.top{padding:1.5rem 0 1rem;}
.top-title{font-size:22px;font-weight:700;line-height:1.4;margin-bottom:4px;}
.top-sub{font-size:13px;color:var(--text2);margin-bottom:1.25rem;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.fbtn{border:1.5px solid var(--border2);border-radius:20px;padding:6px 15px;font-size:13px;cursor:pointer;background:white;color:var(--text2);font-family:inherit;transition:all .15s;}
.fbtn:hover{background:var(--bg);}
.fbtn.on{background:var(--text);color:white;border-color:var(--text);}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mcard{border:1.5px solid var(--border);border-radius:16px;padding:1.4rem 1.2rem;cursor:pointer;background:white;transition:all .15s;text-align:left;}
.mcard:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.mcard-icon{font-size:30px;margin-bottom:8px;}
.mcard-title{font-size:15px;font-weight:700;margin-bottom:5px;}
.mcard-desc{font-size:12px;color:var(--text2);line-height:1.7;}
.count-note{font-size:12px;color:var(--text3);text-align:center;margin-top:.5rem;}

/* ===== CARD MODE ===== */
.card-screen{display:flex;flex-direction:column;min-height:100vh;padding-bottom:1rem;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;margin-bottom:.5rem;}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px;}
.header-info{font-size:13px;color:var(--text2);}
.prog-bar-wrap{background:var(--border);border-radius:4px;height:4px;margin-bottom:1rem;}
.prog-bar{height:4px;border-radius:4px;background:var(--green);transition:width .3s;}

/* subj badge */
.sbadge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:.6rem;}
.sbadge-国語{background:#ede9fe;color:#5b21b6;}
.sbadge-理科{background:#d1fae5;color:#065f46;}
.sbadge-社会{background:#fef3c7;color:#92400e;}
.section-name{font-size:11px;color:var(--text3);margin-bottom:.4rem;}

/* flip card */
.flip-wrap{perspective:1000px;margin-bottom:1rem;}
.flip-inner{position:relative;width:100%;min-height:200px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer;}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;width:100%;min-height:200px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1.5px solid var(--border);background:white;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1.5rem;text-align:center;}
.flip-back{transform:rotateY(180deg);background:var(--green-bg);border-color:var(--green);}
.flip-q{font-size:16px;line-height:1.8;color:var(--text);}
.flip-hint{font-size:12px;color:var(--text3);margin-top:.75rem;}
.flip-a{font-size:20px;font-weight:700;color:var(--green-text);line-height:1.6;}
.flip-fig{margin:.75rem 0;overflow-x:auto;}
.tap-hint{font-size:12px;color:var(--text3);text-align:center;margin-bottom:.75rem;}

/* action buttons */
.action-row{display:flex;gap:10px;margin-bottom:1rem;}
.action-btn{flex:1;border:1.5px solid var(--border2);border-radius:12px;padding:12px 8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-again{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.btn-again:hover{background:#fbd5d1;}
.btn-ok{background:var(--green-bg);color:var(--green-text);border-color:var(--green);}
.btn-ok:hover{background:#c5eed9;}

/* nav buttons */
.nav-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.nav-btn{border:1.5px solid var(--border2);border-radius:12px;padding:10px 16px;font-size:14px;cursor:pointer;background:white;color:var(--text);font-family:inherit;transition:all .15s;}
.nav-btn:hover:not(:disabled){background:var(--bg);}
.nav-btn:disabled{opacity:.35;cursor:default;}
.nav-center{display:flex;gap:8px;justify-content:center;}
.shuffle-btn{border:1.5px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;background:white;color:var(--text2);font-family:inherit;transition:all .15s;}
.shuffle-btn:hover{background:var(--bg);}

/* status dots */
.dots-wrap{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:.75rem 0;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .15s;}
.dot.current{background:var(--blue);transform:scale(1.3);}
.dot.ok{background:var(--green);}
.dot.again{background:var(--red);}
.dot:hover{transform:scale(1.4);}

/* ===== ATTACK MODE ===== */
.attack-screen{display:flex;flex-direction:column;min-height:100vh;padding-bottom:1rem;}
.attack-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;margin-bottom:.5rem;}
.timer-box{font-size:22px;font-weight:700;min-width:50px;text-align:center;}
.timer-box.warn{color:var(--red);}
.atbar-wrap{background:var(--border);border-radius:3px;height:3px;margin-bottom:1rem;}
.atbar{height:3px;border-radius:3px;background:var(--blue);transition:width .1s linear;}
.qcard{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.qtext{font-size:15px;line-height:1.85;margin-bottom:1rem;}
.qfig{margin:.5rem 0 .75rem;overflow-x:auto;}
.choices{display:grid;grid-template-columns:1fr;gap:8px;}
.cbtn{background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;color:var(--text);text-align:left;line-height:1.5;font-family:inherit;transition:all .12s;}
.cbtn:hover:not(:disabled){background:var(--bg);}
.cbtn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-text);}
.cbtn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red-text);}
.cbtn.reveal{background:var(--green-bg);border-color:var(--green);color:var(--green-text);}
.cbtn:disabled{cursor:default;}
.fb{margin-top:.75rem;font-size:13px;padding:9px 13px;border-radius:10px;display:none;line-height:1.6;}
.fb.show{display:block;}
.fb.ok{background:var(--green-bg);color:var(--green-text);}
.fb.ng{background:var(--red-bg);color:var(--red-text);}
.anav{display:flex;justify-content:flex-end;margin-top:.75rem;}
.anext{background:var(--text);color:white;border:none;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:inherit;display:none;}
.anext.show{display:block;}

/* ===== RESULT ===== */
.result{text-align:center;padding:2rem .5rem;}
.result-big{font-size:58px;font-weight:700;line-height:1;}
.result-of{font-size:18px;color:var(--text2);}
.result-comment{font-size:18px;margin:1rem 0 1.5rem;}
.bd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.bd-card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;}
.bd-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.bd-score{font-size:22px;font-weight:700;}
.wrong-list{text-align:left;background:white;border:1.5px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.5rem;}
.wrong-list h3{font-size:13px;color:var(--text2);margin-bottom:.75rem;}
.wrong-item{font-size:13px;padding:.5rem 0;border-bottom:1px solid var(--border);line-height:1.6;}
.wrong-item:last-child{border-bottom:none;}
.wrong-item .wa{color:var(--green-text);font-weight:600;}
.rbtn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.rbtn{border:1.5px solid var(--border2);border-radius:10px;padding:10px 22px;font-size:14px;cursor:pointer;background:white;color:var(--text);font-family:inherit;transition:all .15s;}
.rbtn:hover{background:var(--bg);}
.rbtn.primary{background:var(--text);color:white;border-color:var(--text);}
.rbtn.primary:hover{opacity:.85;}

/* card stage styles */
.c-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:.75rem;min-height:120px;display:flex;flex-direction:column;justify-content:center;}
.c-card-answer{background:var(--green-bg);border-color:var(--green);}
.c-q{font-size:16px;line-height:1.85;color:var(--text);text-align:center;}
.c-a{font-size:22px;font-weight:700;color:var(--green-text);text-align:center;line-height:1.5;}
.hint-row{font-size:12px;color:var(--text3);text-align:center;margin-bottom:.6rem;}
.btn-hint{background:#EFF6FF;color:#1d4ed8;border-color:#93c5fd;}
.btn-hint:hover{background:#dbeafe;}
.btn-reveal{background:#f5f4f0;color:var(--text);border-color:var(--border2);}
.btn-reveal:hover{background:#eceae4;}

.c-exp{background:#fefce8;border:1.5px solid #fde047;border-radius:12px;padding:.9rem 1rem;font-size:13px;line-height:1.75;color:#713f12;margin-bottom:.75rem;}

/* flip (legacy - keep for compatibility) */
.flip-fig{margin:.5rem 0;overflow-x:auto;display:flex;justify-content:center;}
</style>
</head>

  </div>`;
}
function setFilter(f){filter=f;showTop();}

// ===== CARD MODE =====
let cardStage='question'; // 'question' | 'choices' | 'answer'
let choiceResult=null;    // null | 'correct' | 'wrong'
let shuffledChoices=[];

function startCard(){
  const pool=filter==='all'?ALL:ALL.filter(q=>q.subj===filter);
  qs=[...pool];
  status=qs.map(()=>'none');
  idx=0;flipped=false;cardStage='question';choiceResult=null;shuffledChoices=[];
  renderCard();
}

function renderCard(){
  const q=qs[idx];
  const tot=qs.length;
  const okCount=status.filter(s=>s==='ok').length;
  const againCount=status.filter(s=>s==='again').length;
  const figHtml=q.fig?`<div class="flip-fig">${F[q.fig]}</div>`:'';
  const dotsHtml=qs.map((_,i)=>{
    let cls='dot';
    if(i===idx)cls+=' current';
    else if(status[i]==='ok')cls+=' ok';
    else if(status[i]==='again')cls+=' again';
    return `<div class="${cls}" onclick="jumpTo(${i})" title="${i+1}問目"></div>`;
  }).join('');

  let mainHtml='';

  if(cardStage==='question'){
    mainHtml=`
      <div class="c-card">
        ${figHtml}
        <div class="c-q">${q.q}</div>
      </div>
      <div class="hint-row">💡 まず自分で考えてみよう</div>
      <div class="action-row">
        <button class="action-btn btn-hint" onclick="showChoices()">🔢 4択にする</button>
        <button class="action-btn btn-reveal" onclick="showAnswer()">答えを見る</button>
      </div>`;

  } else if(cardStage==='choices'){
    const choicesBtns=shuffledChoices.map(c=>{
      let cls='cbtn';
      if(choiceResult){
        if(c===q.a) cls+=' reveal';
        else if(c===choiceResult&&c!==q.a) cls+=' wrong';
      }
      const disabled=choiceResult?'disabled':'';
      const safe=c.replace(/'/g,"\\'");
      return `<button class="${cls}" ${disabled} onclick="pickChoice('${safe}')">${c}</button>`;
    }).join('');
    const fbHtml=choiceResult
      ? choiceResult==='correct'
        ? `<div class="fb show ok">✓ 正解！</div>`
        : `<div class="fb show ng">✗ 不正解。正解は「${q.a}」です。</div>`
      : '';
    mainHtml=`
      <div class="c-card">
        ${figHtml}
        <div class="c-q">${q.q}</div>
      </div>
      <div class="choices" style="margin:.75rem 0;">${choicesBtns}</div>
      ${fbHtml}
      ${choiceResult?`<div class="action-row" style="margin-top:.75rem;">
        <button class="action-btn btn-reveal" onclick="showAnswer()">答えを確認する</button>
      </div>`:''}`;

  } else {
    const resultBadge=choiceResult==='correct'
      ? `<div style="font-size:12px;color:var(--green-text);margin-bottom:.5rem;">✓ 4択で正解しました</div>`
      : choiceResult==='wrong'
      ? `<div style="font-size:12px;color:var(--red);margin-bottom:.5rem;">✗ 4択で不正解でした</div>`
      : '';
    const expHtml=q.exp?`<div class="c-exp">💡 ${q.exp}</div>`:'';
    mainHtml=`
      <div class="c-card c-card-answer">
        ${figHtml}
        <div class="c-q" style="margin-bottom:.75rem;">${q.q}</div>
        ${resultBadge}
        <div class="c-a">✅ ${q.a}</div>
      </div>
      ${expHtml}
      <div class="action-row">
        <button class="action-btn btn-again" onclick="markAgain()">😓 もう一度</button>
        <button class="action-btn btn-ok" onclick="markOk()">✅ わかった！</button>
      </div>`;
  }
  }

  R.innerHTML=`
  <div class="card-screen">
    <div class="card-header">
      <button class="back-btn" onclick="showTop()">←</button>
      <div class="header-info">${idx+1} / ${tot}　✅${okCount}　😓${againCount}</div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${((idx+1)/tot)*100}%"></div></div>
    <div class="dots-wrap">${dotsHtml}</div>
    <span class="sbadge sbadge-${q.subj}">${q.subj}</span>
    <div class="section-name">${q.s}</div>
    ${mainHtml}
    <div class="nav-row" style="margin-top:1rem;">
      <button class="nav-btn" onclick="prevQ()" ${idx===0?'disabled':''}>← 前へ</button>
      <div class="nav-center">
        <button class="shuffle-btn" onclick="doShuffle()">🔀</button>
      </div>
      <button class="nav-btn" onclick="nextQ()" ${idx===tot-1?'disabled':''}>次へ →</button>
    </div>
    ${okCount+againCount===tot?`<div class="card-result" style="margin-top:1rem;">
      <div style="font-size:14px;color:var(--text2);margin-bottom:.5rem;">全問チェック完了！</div>
      <div>✅ わかった：<strong style="color:var(--green-text)">${okCount}</strong>問　😓 もう一度：<strong style="color:var(--red)">${againCount}</strong>問</div>
      <div class="rbtn-row" style="margin-top:1rem;">
        <button class="rbtn" onclick="startCard()">もう一度</button>
        <button class="rbtn primary" onclick="retryAgain()">😓のみ再挑戦</button>
      </div>
    </div>`:''}
  </div>`;
}

function showChoices(){shuffledChoices=shuffle([...qs[idx].cs]);choiceResult=null;cardStage='choices';renderCard();}
function pickChoice(c){choiceResult=c===qs[idx].a?'correct':'wrong';renderCard();}
function showAnswer(){cardStage='answer';renderCard();}
function doFlip(){showAnswer();}
function jumpTo(i){idx=i;cardStage='question';choiceResult=null;shuffledChoices=[];renderCard();}
function prevQ(){if(idx>0){idx--;cardStage='question';choiceResult=null;shuffledChoices=[];renderCard();}}
function nextQ(){if(idx<qs.length-1){idx++;cardStage='question';choiceResult=null;shuffledChoices=[];renderCard();}}
function markOk(){status[idx]='ok';if(idx<qs.length-1){idx++;cardStage='question';choiceResult=null;shuffledChoices=[];}renderCard();}
function markAgain(){status[idx]='again';if(idx<qs.length-1){idx++;cardStage='question';choiceResult=null;shuffledChoices=[];}renderCard();}
function doShuffle(){
  const combined=qs.map((q,i)=>({q,s:status[i]}));
  for(let i=combined.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[combined[i],combined[j]]=[combined[j],combined[i]];}
  qs=combined.map(c=>c.q);status=combined.map(c=>c.s);
  idx=0;cardStage='question';choiceResult=null;shuffledChoices=[];renderCard();
}
function retryAgain(){
  const wrongQs=qs.filter((_,i)=>status[i]==='again');
  if(wrongQs.length===0){alert('😓の問題はありません！');return;}
  qs=wrongQs;status=qs.map(()=>'none');
  idx=0;cardStage='question';choiceResult=null;shuffledChoices=[];renderCard();
}


// ===== ATTACK MODE =====
function startAttack(){
  const pool=filter==='all'?ALL:ALL.filter(q=>q.subj===filter);
  qs=shuffle(pool);
  idx=0;atScore=0;atWrong=[];atAnswered=false;
  atSubScores={国語:0,理科:0,社会:0};
  atSubTotal={国語:0,理科:0,社会:0};
  qs.forEach(q=>atSubTotal[q.subj]=(atSubTotal[q.subj]||0)+1);
  totalTime=qs.length*30;timeLeft=qs.length*30;
  renderAttack();
}

function renderAttack(){
  clearInterval(timerInterval);
  if(idx>=qs.length){showAttackResult();return;}
  const q=qs[idx];
  const tot=qs.length;
  const qTime=30;
  const sh=shuffle(q.cs);
  const figHtml=q.fig?`<div class="qfig">${F[q.fig]}</div>`:'';

  R.innerHTML=`
  <div class="attack-screen">
    <div class="attack-header">
      <button class="back-btn" onclick="showTop()">←</button>
      <span class="sbadge sbadge-${q.subj}">${q.subj}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;color:var(--text2)">${idx+1}/${tot}</span>
        <div class="timer-box" id="timer">${qTime}s</div>
      </div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${(idx/tot)*100}%"></div></div>
    <div class="atbar-wrap"><div class="atbar" id="atbar" style="width:100%"></div></div>
    <div class="qcard">
      <div class="section-name">${q.s}</div>
      <div class="qtext">${q.q}</div>
      ${figHtml}
      <div class="choices" id="ch">
        ${sh.map(c=>`<button class="cbtn" data-val="${c.replace(/"/g,'&quot;')}" onclick="atChoose(this)">${c}</button>`).join('')}
      </div>
      <div class="fb" id="fb"></div>
    </div>
    <div class="anav"><button class="anext" id="anext" onclick="atNext()">次の問題 →</button></div>
  </div>`;

  atAnswered=false;
  let qLeft=qTime;
  timerInterval=setInterval(()=>{
    qLeft--;timeLeft--;
    const tel=document.getElementById('timer');
    const tbar=document.getElementById('atbar');
    if(tel){tel.textContent=qLeft+'s';tel.className='timer-box'+(qLeft<=5?' warn':'');}
    if(tbar)tbar.style.width=(qLeft/qTime*100)+'%';
    if(qLeft<=0){clearInterval(timerInterval);if(!atAnswered)atAutoSkip();}
  },1000);
}

function atChoose(btn){
  if(atAnswered)return;atAnswered=true;
  clearInterval(timerInterval);
  const chosen=btn.dataset.val, answer=qs[idx].a;
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.dataset.val===answer)b.classList.add('reveal');});
  const fb=document.getElementById('fb');
  if(chosen===answer){
    btn.classList.remove('reveal');btn.classList.add('correct');
    fb.textContent='✓ 正解！';fb.className='fb show ok';
    atScore++;atSubScores[qs[idx].subj]=(atSubScores[qs[idx].subj]||0)+1;
  }else{
    btn.classList.add('wrong');
    fb.textContent='✗ 不正解。正解は「'+answer+'」です。';fb.className='fb show ng';
    atWrong.push(qs[idx]);
  }
  document.getElementById('anext').className='anext show';
}
function atAutoSkip(){
  if(atAnswered)return;atAnswered=true;
  const answer=qs[idx].a;
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.dataset.val===answer)b.classList.add('reveal');});
  const fb=document.getElementById('fb');
  fb.textContent='⏰ 時間切れ！正解は「'+answer+'」です。';fb.className='fb show ng';
  atWrong.push(qs[idx]);
  document.getElementById('anext').className='anext show';
}
function atNext(){idx++;renderAttack();}

function showAttackResult(){
  clearInterval(timerInterval);
  const tot=qs.length;
  const pct=Math.round(atScore/tot*100);
  const comment=pct>=90?'🎉 すばらしい！':pct>=70?'👍 よくできました！':pct>=50?'📚 もう一息！':'💪 もっと練習しよう！';
  const bdHtml=['国語','理科','社会'].map(s=>`
    <div class="bd-card">
      <div class="bd-label">${s}</div>
      <div class="bd-score">${atSubScores[s]||0}／${atSubTotal[s]||0}</div>
    </div>`).join('');
  const wrongHtml=atWrong.length>0?`
    <div class="wrong-list">
      <h3>📝 間違えた問題（${atWrong.length}問）</h3>
      ${atWrong.map(q=>`<div class="wrong-item">${q.q}<br><span class="wa">→ ${q.a}</span></div>`).join('')}
    </div>`:'';

  R.innerHTML=`
  <div class="result">
    <div style="font-size:13px;color:var(--text2);margin-bottom:.5rem;">⏱️ タイムアタック 完了！</div>
    <div class="result-big">${atScore}</div>
    <div class="result-of">／${tot}問正解（${pct}%）</div>
    <div class="result-comment">${comment}</div>
    <div class="bd-grid">${bdHtml}</div>
    ${wrongHtml}
    <div class="rbtn-row">
      <button class="rbtn" onclick="showTop()">トップに戻る</button>
      <button class="rbtn primary" onclick="startAttack()">もう一度！</button>
    </div>
  </div>`;
}

showTop();
</script>
</body>
</html>
