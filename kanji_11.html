<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字確認問題 第11回</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #fdf6e3;
    --gold: #d4a017;
    --blue: #1a5276;
    --green: #1a7a4a;
    --accent: #e74c3c;
    --soft: #f5efe0;
    --purple: #6c3483;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,160,120,0.15) 39px, rgba(180,160,120,0.15) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,160,120,0.08) 39px, rgba(180,160,120,0.08) 40px);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--ink);
    text-align: center;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
    letter-spacing: 0.1em;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 14px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .mode-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-tab {
    padding: 6px 12px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 20px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
    color: #666;
  }
  .mode-tab.active { background: var(--ink); color: white; border-color: var(--ink); }
  .mode-tab.write { border-color: var(--purple); color: var(--purple); }
  .mode-tab.write.active { background: var(--purple); color: white; }

  .progress-bar {
    width: 100%;
    max-width: 560px;
    height: 6px;
    background: #ddd;
    border-radius: 3px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .counter {
    font-size: 0.78rem;
    color: #888;
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }

  /* ── カード ── */
  .card-container {
    perspective: 1200px;
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  .card {
    width: 100%;
    min-height: 400px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.no-flip { cursor: default; }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    min-height: 400px;
  }

  .card-front { background: white; border: 2px solid rgba(180,160,100,0.3); }
  .card-back { background: linear-gradient(135deg, #fffef8, #fdf6e3); border: 2px solid var(--gold); transform: rotateY(180deg); }

  /* 手書きモード用フロント */
  .card-front.write-mode { background: white; border: 2px solid rgba(108,52,131,0.3); cursor: default; }

  .question-num { position: absolute; top: 14px; left: 18px; font-size: 0.72rem; color: #bbb; font-weight: 700; }
  .mode-badge { position: absolute; top: 14px; right: 18px; font-size: 0.62rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
  .mode-badge.flash { background: #eee; color: #999; }
  .mode-badge.quiz-b { background: #e8f4fd; color: var(--blue); }
  .mode-badge.write-b { background: #f3e6ff; color: var(--purple); }

  .tap-hint { position: absolute; bottom: 14px; right: 18px; font-size: 0.62rem; color: #ccc; }
  .instruction { font-size: 0.67rem; color: #ccc; margin-bottom: 14px; letter-spacing: 0.04em; }

  .sentence-wrap {
    width: 100%;
    text-align: center;
    line-height: 2.4;
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: var(--ink);
    margin-bottom: 10px;
  }

  .ul {
    border-bottom: 2.5px solid var(--accent);
    padding-bottom: 1px;
    font-weight: 700;
    color: #c0392b;
  }

  .reading-hint { font-size: 0.7rem; color: #bbb; margin-top: 4px; }

  /* 手書きモード専用 */
  .write-prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin-top: 8px;
  }

  .write-reading-big {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    color: var(--purple);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-align: center;
    background: #f9f0ff;
    padding: 10px 24px;
    border-radius: 12px;
    border: 2px dashed rgba(108,52,131,0.3);
  }

  .write-box {
    width: 120px;
    height: 120px;
    border: 3px solid rgba(108,52,131,0.4);
    border-radius: 8px;
    background: white;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 4px auto;
  }

  .write-box::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(108,52,131,0.15);
  }
  .write-box::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(108,52,131,0.15);
  }

  .write-box-label {
    position: absolute;
    top: 4px; left: 6px;
    font-size: 0.55rem;
    color: rgba(108,52,131,0.4);
  }

  .reveal-btn {
    padding: 10px 28px;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .reveal-btn:hover { background: #5a2d72; transform: translateY(-1px); }

  .self-check {
    display: none;
    gap: 10px;
    margin-top: 8px;
    flex-direction: column;
    align-items: center;
  }
  .self-check.show { display: flex; }

  .self-check-label {
    font-size: 0.78rem;
    color: #666;
    text-align: center;
  }

  .self-check-btns {
    display: flex;
    gap: 10px;
  }

  .sc-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sc-btn.ok { background: var(--green); color: white; }
  .sc-btn.ok:hover { background: #145a32; }
  .sc-btn.ng { background: var(--accent); color: white; }
  .sc-btn.ng:hover { background: #922b21; }

  /* 裏面 */
  .kanji-big {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(3rem, 12vw, 5rem);
    color: var(--ink);
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 2px 3px 0 rgba(180,160,100,0.3);
  }

  .reading-back { font-size: 0.88rem; color: var(--gold); font-weight: 700; margin-bottom: 8px; letter-spacing: 0.15em; }
  .divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 6px auto 12px; }

  .image-area {
    width: 100%;
    max-width: 300px;
    background: var(--soft);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    text-align: center;
    border: 1px solid rgba(180,160,100,0.2);
  }

  .emoji-scene { font-size: clamp(2rem, 8vw, 3rem); margin-bottom: 6px; line-height: 1.2; }
  .memory-text { font-size: clamp(0.7rem, 2.2vw, 0.8rem); color: #555; line-height: 1.8; text-align: left; }
  .memory-text strong { color: var(--accent); }
  .stroke-hint { font-size: 0.67rem; color: #aaa; margin-top: 6px; }

  /* ナビ */
  .nav {
    display: flex;
    gap: 12px;
    margin-top: 18px;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .nav-btn {
    padding: 10px 22px;
    border: 2px solid var(--ink);
    background: white;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.83rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--ink); color: white; transform: translateY(-1px); }
  .nav-btn:active { transform: translateY(0); }
  .nav-btn:disabled { opacity: 0.28; cursor: default; }
  .nav-btn:disabled:hover { background: white; color: var(--ink); transform: none; }
  .nav-btn.primary { background: var(--ink); color: white; }
  .nav-btn.primary:hover { background: #2d2d4e; }

  /* 書き取り入力 */
  .quiz-input-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; width: 100%; max-width: 260px; margin-top: 12px;
  }

  .quiz-input {
    width: 100%; font-size: 1.4rem; text-align: center;
    padding: 8px; border: 2px solid #ddd; border-radius: 8px;
    font-family: 'Kaisei Decol', serif; outline: none; transition: border-color 0.2s;
  }
  .quiz-input:focus { border-color: var(--gold); }
  .quiz-input.correct { border-color: var(--green); background: #f0fff4; }
  .quiz-input.wrong { border-color: var(--accent); background: #fff5f5; }

  .check-btn {
    padding: 8px 28px; background: var(--blue); color: white;
    border: none; border-radius: 8px; font-size: 0.83rem;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .check-btn:hover { background: #1a3a6e; transform: translateY(-1px); }

  .result-msg { font-size: 0.83rem; font-weight: 700; min-height: 22px; text-align: center; }
  .result-msg.ok { color: var(--green); }
  .result-msg.ng { color: var(--accent); }

  /* 完了 */
  .complete-screen {
    display: none; flex-direction: column; align-items: center;
    gap: 12px; text-align: center; padding: 32px;
    position: relative; z-index: 1; width: 100%; max-width: 560px;
  }
  .complete-screen.show { display: flex; }

  .score-circle {
    width: 100px; height: 100px; border-radius: 50%;
    border: 4px solid var(--gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Kaisei Decol', serif;
  }
  .score-num { font-size: 2rem; color: var(--ink); font-weight: 700; }
  .score-label { font-size: 0.62rem; color: #888; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .card-container { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<h1>📝 漢字確認問題 第11回</h1>
<p class="subtitle">下線部を漢字に直しなさい（全40問）</p>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('flash')">📚 フラッシュ</button>
  <button class="mode-tab" onclick="setMode('quiz')">✏️ タイプ入力</button>
  <button class="mode-tab write" onclick="setMode('write')">🖊️ 手書き練習</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<p class="counter" id="counter"></p>

<div class="card-container">
  <div class="card" id="card" onclick="handleCardClick()">
    <div class="card-face card-front" id="front"></div>
    <div class="card-face card-back" id="back"></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" onclick="prev()" id="prevBtn" disabled>← 前</button>
  <button class="nav-btn primary" onclick="next()" id="nextBtn">次 →</button>
</div>

<div class="complete-screen" id="complete">
  <div style="font-size:3rem">🎉</div>
  <h2 style="font-family:'Kaisei Decol',serif;font-size:1.4rem;color:var(--ink)">全問完了！</h2>
  <div class="score-circle" id="scoreCircle">
    <span class="score-num" id="scoreNum">-</span>
    <span class="score-label" id="scoreLabel">点 / 40</span>
  </div>
  <p style="font-size:0.83rem;color:#666;max-width:280px;line-height:1.8" id="completeMsg">お疲れさまでした！</p>
  <button class="nav-btn primary" onclick="restart()">🔄 もう一度</button>
</div>

let current = 0;
let flipped = false;
let mode = 'flash';
let quizScores = new Array(40).fill(null);
let revealed = false;

function formatSentence(s) {
  return s.replace(/<u>(.*?)<\/u>/g, (_, t) => `<span class="ul">${t}</span>`);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.remove('active');
    if (i === 0 && m === 'flash') t.classList.add('active');
    if (i === 1 && m === 'quiz') t.classList.add('active');
    if (i === 2 && m === 'write') t.classList.add('active');
  });
  flipped = false;
  revealed = false;
  quizScores = new Array(40).fill(null);
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('card').classList.toggle('no-flip', m === 'write' || m === 'quiz');
  renderCard();
}

function renderCard() {
  const d = data[current];
  document.getElementById('progress').style.width = ((current + 1) / 40 * 100) + '%';
  document.getElementById('counter').textContent = `${current + 1} / 40`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').textContent = current === 39 ? '完了 ✓' : '次 →';

  const front = document.getElementById('front');
  const back = document.getElementById('back');

  // バッジ
  const badgeClass = mode === 'flash' ? 'flash' : mode === 'quiz' ? 'quiz-b' : 'write-b';
  const badgeLabel = mode === 'flash' ? 'フラッシュ' : mode === 'quiz' ? 'タイプ入力' : '手書き練習';

  if (mode === 'write') {
    // 手書きモード：表面に読みだけ大きく表示
    front.className = 'card-face card-front write-mode';
    front.innerHTML = `
      <span class="question-num">問 ${current + 1}</span>
      <span class="mode-badge write-b">${badgeLabel}</span>
      <p class="instruction">— 読みを見て、紙に漢字を書こう —</p>
      <div class="write-prompt">
        <div class="write-reading-big">${d.reading}</div>
        <p style="font-size:0.7rem;color:#aaa;margin-top:4px;">${formatSentence(d.sentence)}</p>
        <div class="write-box"><span class="write-box-label">ここに書く</span></div>
        <button class="reveal-btn" onclick="revealAnswer()">答えを見る 👁️</button>
        <div class="self-check" id="selfCheck">
          <p class="self-check-label">書けましたか？</p>
          <div class="self-check-btns">
            <button class="sc-btn ok" onclick="selfCheckResult(true)">⭕ 書けた</button>
            <button class="sc-btn ng" onclick="selfCheckResult(false)">❌ 書けなかった</button>
          </div>
        </div>
      </div>
    `;
  } else {
    front.className = 'card-face card-front';
    front.innerHTML = `
      <span class="question-num">問 ${current + 1}</span>
      <span class="mode-badge ${badgeClass}">${badgeLabel}</span>
      <p class="instruction">— 下線部を漢字に直しなさい —</p>
      <div class="sentence-wrap">${formatSentence(d.sentence)}</div>
      <p class="reading-hint">よみ：${d.reading}</p>
      ${mode === 'quiz' ? `
        <div class="quiz-input-area" onclick="event.stopPropagation()">
          <input class="quiz-input" id="quizInput" type="text" placeholder="漢字を書こう"
            onkeydown="if(event.key==='Enter')checkAnswer()">
          <button class="check-btn" onclick="checkAnswer()">確認する</button>
          <p class="result-msg" id="resultMsg"></p>
        </div>
      ` : `<span class="tap-hint">👆 タップして答えを見る</span>`}
    `;
  }

  back.innerHTML = `
    <p class="kanji-big">${d.fullKanji}</p>
    <p class="reading-back">📖 ${d.reading}</p>
    <div class="divider"></div>
    <div class="image-area">
      <div class="emoji-scene">${d.emoji}</div>
      <p class="memory-text">${d.memory}</p>
    </div>
    <p class="stroke-hint">✏️ ${d.stroke}</p>
  `;

  revealed = false;
}

function revealAnswer() {
  if (!revealed) {
    revealed = true;
    flipped = true;
    document.getElementById('card').classList.add('flipped');
    setTimeout(() => {
      const sc = document.getElementById('selfCheck');
      if (sc) sc.classList.add('show');
    }, 650);
  }
}

function selfCheckResult(ok) {
  quizScores[current] = ok;
  // 次へ自動スクロール的なフィードバック
  const sc = document.getElementById('selfCheck');
  if (sc) {
    sc.innerHTML = ok
      ? `<p style="color:var(--green);font-weight:700;font-size:0.9rem">⭕ 素晴らしい！次へ進もう</p>`
      : `<p style="color:var(--accent);font-weight:700;font-size:0.9rem">❌ もう一度書いて覚えよう！</p>`;
  }
}

function handleCardClick() {
  if (mode === 'flash') {
    flipped = !flipped;
    document.getElementById('card').classList.toggle('flipped', flipped);
  }
}

function checkAnswer() {
  const input = document.getElementById('quizInput');
  const msg = document.getElementById('resultMsg');
  const val = input.value.trim();
  const d = data[current];
  const correct = d.fullKanji;
  const correctCore = correct.replace(/[ぁ-んのをはがもでにへとやよ]/g, '');
  const ok = val === correct || val === correctCore;

  if (ok) {
    input.className = 'quiz-input correct';
    msg.className = 'result-msg ok';
    msg.textContent = '⭕ 正解！「' + correct + '」';
    quizScores[current] = true;
  } else {
    input.className = 'quiz-input wrong';
    msg.className = 'result-msg ng';
    msg.textContent = '❌ 正解は「' + correct + '」';
    quizScores[current] = false;
  }
  flipped = true;
  document.getElementById('card').classList.add('flipped');
}

function prev() {
  if (current > 0) {
    current--;
    flipped = false;
    revealed = false;
    document.getElementById('card').classList.remove('flipped');
    renderCard();
  }
}

function next() {
  if (current < 39) {
    current++;
    flipped = false;
    revealed = false;
    document.getElementById('card').classList.remove('flipped');
    renderCard();
  } else {
    showComplete();
  }
}

function showComplete() {
  const score = quizScores.filter(s => s === true).length;
  const total = quizScores.filter(s => s !== null).length;
  document.querySelector('.card-container').style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  document.querySelector('.progress-bar').style.display = 'none';
  document.getElementById('counter').style.display = 'none';
  document.querySelector('.mode-tabs').style.display = 'none';
  const c = document.getElementById('complete');
  c.classList.add('show');

  if (total > 0) {
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreLabel').textContent = `点 / ${total}`;
    document.getElementById('scoreCircle').style.display = 'flex';
    document.getElementById('completeMsg').textContent =
      mode === 'write'
        ? `書けた：${score}問 / 書けなかった：${total - score}問\nもう一度練習しよう！`
        : `正解：${score}問 / 不正解：${total - score}問`;
  } else {
    document.getElementById('scoreCircle').style.display = 'none';
    document.getElementById('completeMsg').textContent = 'お疲れさまでした！';
  }
}

function restart() {
  current = 0;
  flipped = false;
  revealed = false;
  quizScores = new Array(40).fill(null);
  document.querySelector('.card-container').style.display = 'block';
  document.querySelector('.nav').style.display = 'flex';
  document.querySelector('.progress-bar').style.display = 'block';
  document.getElementById('counter').style.display = 'block';
  document.querySelector('.mode-tabs').style.display = 'flex';
  document.getElementById('complete').classList.remove('show');
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

renderCard();
</script>
