<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組み分けテスト（5月）対策クイズ</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: #e2ddd6;
    --border-strong: #c8c2b8;
    --text: #1a1a18;
    --text2: #6b6760;
    --text3: #a8a49f;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #085041;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --red-text: #501313;
    --blue: #378ADD;
    --accent: #2563eb;
    --kokugo: #7c3aed;
    --rika: #059669;
    --shakai: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
  }
  #app { max-width: 660px; margin: 0 auto; }

  /* トップ */
  .top { padding: 2rem 0 1rem; }
  .top-title { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
  .top-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .subject-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .sbtn {
    border: 1.5px solid var(--border-strong); border-radius: 20px;
    padding: 6px 16px; font-size: 13px; cursor: pointer;
    background: white; color: var(--text2); transition: all 0.15s;
    font-family: inherit;
  }
  .sbtn:hover { background: var(--bg); }
  .sbtn.active { background: var(--text); color: white; border-color: var(--text); }
  .mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .mode-card {
    border: 1.5px solid var(--border); border-radius: 16px;
    padding: 1.5rem 1.25rem; cursor: pointer; background: white;
    transition: all 0.15s; text-align: left;
  }
  .mode-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .mc-icon { font-size: 32px; margin-bottom: 10px; }
  .mc-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .mc-desc { font-size: 12px; color: var(--text2); line-height: 1.7; }

  /* ヘッダー */
  .qheader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .qheader-left { display: flex; align-items: center; gap: 8px; }
  .subj-badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; letter-spacing: 0.05em;
  }
  .badge-国語 { background: #ede9fe; color: var(--kokugo); }
  .badge-理科 { background: #d1fae5; color: #065f46; }
  .badge-社会 { background: #fef3c7; color: #92400e; }
  .prog { font-size: 13px; color: var(--text2); }
  .timer-wrap { display: flex; align-items: center; gap: 6px; }
  .timer { font-size: 18px; font-weight: 700; color: var(--text); min-width: 48px; text-align: right; }
  .timer.warn { color: #dc2626; }
  .bar-wrap { background: var(--border); border-radius: 4px; height: 5px; margin-bottom: 4px; }
  .bar { height: 5px; border-radius: 4px; background: var(--green); transition: width 0.3s; }
  .tbar-wrap { background: var(--border); border-radius: 3px; height: 3px; margin-bottom: 1rem; }
  .tbar { height: 3px; border-radius: 3px; background: var(--blue); transition: width 0.1s linear; }

  /* カード */
  .card {
    background: white; border: 1.5px solid var(--border);
    border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
  }
  .stag { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .qtext { font-size: 16px; color: var(--text); line-height: 1.85; margin-bottom: 1.1rem; }
  .fig { margin: 0.5rem 0 1rem; display: flex; justify-content: center; overflow-x: auto; }
  .choices { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .cbtn {
    background: white; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 15px;
    font-size: 14px; cursor: pointer; color: var(--text);
    text-align: left; line-height: 1.6; transition: all 0.12s;
    font-family: inherit; display: flex; align-items: flex-start; gap: 8px;
  }
  .cbtn::before { content: ''; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong); flex-shrink: 0; margin-top: 1px; }
  .cbtn:hover:not(:disabled) { border-color: var(--border-strong); background: var(--bg); }
  .cbtn.correct { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
  .cbtn.correct::before { background: var(--green); border-color: var(--green); content: '✓'; color: white; font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .cbtn.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red-text); }
  .cbtn.wrong::before { background: var(--red); border-color: var(--red); content: '✗'; color: white; font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .cbtn.reveal { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
  .cbtn.reveal::before { background: var(--green); border-color: var(--green); content: '✓'; color: white; font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .cbtn:disabled { cursor: default; }
  .fb {
    margin-top: 0.85rem; font-size: 13px; padding: 10px 14px;
    border-radius: 10px; display: none; line-height: 1.6;
  }
  .fb.show { display: block; }
  .fb.ok { background: var(--green-bg); color: var(--green-text); }
  .fb.ng { background: var(--red-bg); color: var(--red-text); }
  .nav { display: flex; justify-content: flex-end; }
  .nbtn {
    background: var(--text); color: white; border: none;
    border-radius: 10px; padding: 10px 24px; font-size: 14px;
    cursor: pointer; display: none; font-family: inherit;
    transition: opacity 0.15s;
  }
  .nbtn:hover { opacity: 0.85; }
  .nbtn.show { display: block; }

  /* 結果 */
  .result { text-align: center; padding: 2rem 0.5rem; }
  .result-score { font-size: 64px; font-weight: 700; color: var(--text); line-height: 1; }
  .result-total { font-size: 22px; color: var(--text2); }
  .result-comment { font-size: 18px; color: var(--text); margin: 0.75rem 0 1.5rem; }
  .breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .bd-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 10px; }
  .bd-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .bd-score { font-size: 22px; font-weight: 700; color: var(--text); }
  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .rbtn {
    border: 1.5px solid var(--border-strong); border-radius: 10px;
    padding: 10px 24px; font-size: 14px; cursor: pointer;
    background: white; color: var(--text); font-family: inherit;
    transition: all 0.15s;
  }
  .rbtn:hover { background: var(--bg); }
  .rbtn.primary { background: var(--text); color: white; border-color: var(--text); }
  .rbtn.primary:hover { opacity: 0.85; }
</style>
</head>

// ===== STATE =====
let mode=null, subjectFilter='all', questions=[], idx=0, score=0, answered=false;
let timerInterval=null, timeLeft=0, totalTime=0;
let subScores={国語:0,理科:0,社会:0}, subTotal={国語:0,理科:0,社会:0};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function showTop(){
  clearInterval(timerInterval);
  const filtered=subjectFilter==='all'?ALL:ALL.filter(q=>q.subj===subjectFilter);
  document.getElementById('root').innerHTML=`
  <div class="top">
    <div class="top-title">組み分けテスト（5月）<br>対策クイズ</div>
    <div class="top-sub">国語・社会・理科 全${ALL.length}問</div>
    <div class="subject-row">
      <button class="sbtn${subjectFilter==='all'?' active':''}" onclick="setSubject('all')">全科目（${ALL.length}問）</button>
      <button class="sbtn${subjectFilter==='国語'?' active':''}" onclick="setSubject('国語')">国語（${ALL.filter(q=>q.subj==='国語').length}問）</button>
      <button class="sbtn${subjectFilter==='理科'?' active':''}" onclick="setSubject('理科')">理科（${ALL.filter(q=>q.subj==='理科').length}問）</button>
      <button class="sbtn${subjectFilter==='社会'?' active':''}" onclick="setSubject('社会')">社会（${ALL.filter(q=>q.subj==='社会').length}問）</button>
    </div>
    <div class="mode-cards">
      <div class="mode-card" onclick="startMode('review')">
        <div class="mc-icon">📖</div>
        <div class="mc-title">復習モード</div>
        <div class="mc-desc">じっくり考えながら解こう。正解・不正解の解説が表示されます。</div>
      </div>
      <div class="mode-card" onclick="startMode('attack')">
        <div class="mc-icon">⏱️</div>
        <div class="mc-title">タイムアタック</div>
        <div class="mc-desc">1問30秒！時間内に全問解こう。スピード勝負！</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text3);text-align:center;">選択中：${filtered.length}問が出題されます</div>
  </div>`;
}

function setSubject(s){subjectFilter=s;showTop();}

function startMode(m){
  mode=m;
  const pool=subjectFilter==='all'?ALL:ALL.filter(q=>q.subj===subjectFilter);
  questions=shuffle(pool);
  idx=0;score=0;answered=false;
  subScores={国語:0,理科:0,社会:0};
  subTotal={国語:0,理科:0,社会:0};
  questions.forEach(q=>subTotal[q.subj]=(subTotal[q.subj]||0)+1);
  if(m==='attack'){totalTime=questions.length*30;timeLeft=questions.length*30;}
  renderQ();
}

function renderQ(){
  clearInterval(timerInterval);
  if(idx>=questions.length){showResult();return;}
  const q=questions[idx];
  const sh=shuffle(q.cs);
  const tot=questions.length;
  const pct=(idx/tot)*100;
  const badge=`<span class="subj-badge badge-${q.subj}">${q.subj}</span>`;
  const timerHtml=mode==='attack'?`<div class="timer-wrap"><span class="timer" id="timer">${timeLeft-(idx*30>=0?0:0)}s</span></div>`:'';
  const tbarHtml=mode==='attack'?`<div class="tbar-wrap"><div class="tbar" id="tbar" style="width:${(timeLeft/totalTime)*100}%"></div></div>`:'';

  document.getElementById('root').innerHTML=`
  <div class="qheader">
    <div class="qheader-left">${badge}<span style="font-size:12px;color:var(--text2)">${q.s}</span></div>
    <div class="meta"><span class="prog">${idx+1}／${tot}</span>${timerHtml}</div>
  </div>
  <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
  ${tbarHtml}
  <div class="card">
    <div class="qtext">${q.q}</div>
    ${q.fig?`<div class="fig">${F[q.fig]}</div>`:''}
    <div class="choices" id="ch">
      ${sh.map(c=>`<button class="cbtn" data-val="${esc(c)}" onclick="choose(this)">${c}</button>`).join('')}
    </div>
    <div class="fb" id="fb"></div>
  </div>
  <div class="nav"><button class="nbtn" id="nb" onclick="nextQ()">次の問題 →</button></div>`;

  answered=false;
  if(mode==='attack') startTimer();
}

function startTimer(){
  let qTime=30;
  const updateDisplay=()=>{
    const tel=document.getElementById('timer');
    const tbar=document.getElementById('tbar');
    if(tel){tel.textContent=qTime+'s';tel.className='timer'+(qTime<=5?' warn':'');}
    if(tbar){const elapsed=questions.length*30-timeLeft;tbar.style.width=Math.max(0,(timeLeft/totalTime)*100)+'%';}
  };
  timerInterval=setInterval(()=>{
    qTime--;timeLeft--;
    updateDisplay();
    if(qTime<=0){clearInterval(timerInterval);if(!answered)autoSkip();}
  },1000);
}

function autoSkip(){
  if(answered)return;answered=true;
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.dataset.val===questions[idx].a)b.classList.add('reveal');});
  const fb=document.getElementById('fb');
  if(fb){fb.textContent='⏰ 時間切れ！正解は「'+questions[idx].a+'」です。';fb.className='fb show ng';}
  const nb=document.getElementById('nb');if(nb)nb.className='nbtn show';
}

function choose(btn){
  if(answered)return;answered=true;
  clearInterval(timerInterval);
  const chosen=btn.dataset.val,answer=questions[idx].a;
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.dataset.val===answer)b.classList.add('reveal');});
  const fb=document.getElementById('fb');
  if(chosen===answer){
    btn.classList.remove('reveal');btn.classList.add('correct');
    fb.textContent='✓ 正解！';fb.className='fb show ok';
    score++;subScores[questions[idx].subj]=(subScores[questions[idx].subj]||0)+1;
  }else{
    btn.classList.add('wrong');
    fb.textContent='✗ 不正解。正解は「'+answer+'」です。';fb.className='fb show ng';
  }
  document.getElementById('nb').className='nbtn show';
}

function nextQ(){idx++;renderQ();}

function showResult(){
  clearInterval(timerInterval);
  const tot=questions.length;
  const pct=Math.round(score/tot*100);
  const comment=pct>=90?'🎉 すばらしい！':pct>=70?'👍 よくできました！':pct>=50?'📚 もう一息！':'💪 もっと練習しよう！';
  const bdHtml=['国語','理科','社会'].map(s=>`
    <div class="bd-card">
      <div class="bd-label">${s}</div>
      <div class="bd-score">${subScores[s]||0}／${subTotal[s]||0}</div>
    </div>`).join('');
  document.getElementById('root').innerHTML=`
  <div class="result">
    <div style="font-size:14px;color:var(--text2);margin-bottom:8px;">${mode==='attack'?'⏱ タイムアタック':'📖 復習モード'}　完了！</div>
    <div class="result-score">${score}</div>
    <div class="result-total">／${tot}問正解</div>
    <div class="result-comment">${comment}</div>
    <div class="breakdown">${bdHtml}</div>
    <div class="result-btns">
      <button class="rbtn" onclick="showTop()">トップに戻る</button>
      <button class="rbtn primary" onclick="startMode('${mode}')">もう一度挑戦</button>
    </div>
  </div>`;
}

showTop();
</script>
